spring:
  application:
    name: regularAuthentication

  datasource:
    url: jdbc:postgresql://localhost:5432/regularAuthentication
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

# Add this temporarily to see exactly why Spring Security rejects requests
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG