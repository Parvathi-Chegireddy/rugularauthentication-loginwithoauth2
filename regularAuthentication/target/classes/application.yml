spring:
  application:
    name: regularAuthentication

  datasource:
    url: jdbc:mysql://localhost:3306/regularAuthentication?createDatabaseIfNotExist=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

# Add this temporarily to see exactly why Spring Security rejects requests
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG